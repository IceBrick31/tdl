<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tasks</title>
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <!-- 引入农历库 -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.2.37/lunar.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

        :root {
            --primary: #1a73e8;
            --primary-light: #e8f0fe;
            --bg-color: #ffffff;
            --surface: #f8f9fa;
            --text-main: #202124;
            --text-sub: #5f6368;
            --border: #dadce0;
            --weekend-bg: #f8f9fa;
            --fab-shadow: 0 4px 8px 3px rgba(60,64,67,0.15), 0 1px 3px rgba(60,64,67,0.3);
            --menu-shadow: 0 2px 6px 2px rgba(60,64,67,0.15);
            --lunar-color: #9aa0a6;
            --festival-color: #ea4335;
        }

        body {
            font-family: 'Roboto', "PingFang SC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 侧边栏 --- */
        aside {
            width: 120px; background: var(--surface); padding: 20px;
            display: flex; flex-direction: column; border-right: 1px solid var(--border); flex-shrink: 0;
        }
        .logo { font-size: 22px; color: var(--text-sub); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; padding-left: 10px; }
        .nav-btn {
            background: none; border: none; text-align: left; padding: 12px 24px; border-radius: 0 50px 50px 0;
            margin-left: -20px; margin-bottom: 5px; cursor: pointer; font-size: 14px; font-weight: 500;
            color: var(--text-sub); display: flex; align-items: center; gap: 15px; transition: background 0.2s;
        }
        .nav-btn.active { background: var(--primary-light); color: var(--primary); }
        .action-group { margin-top: auto; border-top: 1px solid var(--border); padding-top: 15px; }
        .text-btn { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 13px; padding: 10px; display: block; width: 100%; text-align: left; }

        /* --- 主视图 --- */
        main { flex-grow: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; width: 100%; }
        /* 修改 padding-bottom 为 60vh (屏幕高度的60%)，确保最后一行也能滚到正中间 */
        .view-container { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 0; /* 【关键】这里改成 0 */
            padding-bottom: 60vh; /* 保持底部滚动空间 */
            display: none; 
        }
        .view-container.active { display: block; }

        .calendar-header { 
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: var(--bg-color); /* 必须有背景色 */
            
            padding: 15px 20px; /* 内部撑开空间 */
            border-bottom: 1px solid var(--border);
            
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            /* 注意：把之前的 margin: -15px... 删掉 */
        }
        .header-left { display: flex; flex-direction: column; }
        .weather-info { font-size: 12px; color: var(--text-sub); margin-top: 4px; display: flex; align-items: center; gap: 5px;}
        .cal-ctrls button { background: white; border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; cursor: pointer; color: var(--text-main); }
        .settings-icon { cursor: pointer; opacity: 0.6; font-size: 16px; margin-left: 5px; vertical-align: middle;}
        
        /* --- 日历网格 --- */
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            border: 1px solid var(--border); border-radius: 8px;
            background: var(--border); gap: 1px; 
            
            margin: 15px 20px; 
            width: auto; /* 自动适应 */
        }
        .cal-head-cell { background: var(--bg-color); padding: 10px 0; text-align: center; font-size: 12px; font-weight: 500; color: var(--text-sub); }
        .cal-head-cell.weekend { color: var(--primary); background: var(--weekend-bg); }

        .day-cell {
            background: white; min-height: 110px; padding: 4px; 
            cursor: pointer; display: flex; flex-direction: column; gap: 2px; overflow: hidden; position: relative;
        }
        .day-cell.weekend-cell { background-color: var(--weekend-bg); }
        .day-cell.other-month { background: #fcfcfc; opacity: 0.6; }

        /* 日期数字行 */
        .day-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; padding: 0 2px;}
        .day-number {
            width: 24px; height: 24px; font-size: 13px; font-weight: 500;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }
        .day-cell.today .day-number { background: var(--primary); color: white; }

        .day-expand-btn {
            font-size: 12px; cursor: pointer; color: #aaa; background: transparent; border: none; 
            padding: 2px 4px; border-radius: 4px; transition: 0.2s;
        }
        .day-expand-btn:hover { color: var(--primary); background: var(--primary-light); }
        .day-expand-btn:active { transform: scale(0.9); }

        /* 农历与天气文字 */
        .lunar-text { font-size: 10px; color: var(--lunar-color); margin-top: 2px; text-align: right; line-height: 1.2; }
        .lunar-text.festival { color: var(--festival-color); }
        .day-weather { font-size: 10px; margin-left: 2px; }

        /* 任务条 */
        .cal-task-pill {
            font-size: 11px; background: var(--primary-light); color: var(--primary);
            padding: 2px 5px; border-radius: 4px; cursor: pointer;
            border-left: 3px solid var(--primary); margin-top: 1px;
            white-space: normal; word-break: break-word; line-height: 1.2;
            text-align: left;
        }
        .cal-task-pill.completed { background: #e0e0e0; color: #888; border-left-color: #aaa; text-decoration: line-through; }

        /* --- 模态框 & 菜单 --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; }
        .modal { background: white; width: 85%; max-width: 400px; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 15px; max-height: 85vh; overflow-y: auto; }
        
        .context-menu {
            position: fixed; display: none; background: white; border-radius: 8px; box-shadow: var(--menu-shadow);
            z-index: 9999; width: 200px; overflow: hidden; padding: 5px 0; border: 1px solid #eee;
        }
        .context-menu-item { padding: 12px 15px; font-size: 14px; cursor: pointer; color: var(--text-main); display: flex; align-items: center; gap: 12px; }
        .context-menu-item:hover { background: #f1f3f4; }
        .context-menu-item.danger { color: #d93025; }

        /* 列表项 */
        /*.task-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f3f4; }*/
        /* --- 列表视图 (新版：多列瀑布流 + 分组) --- */
        #taskList {
            /* PC端核心：3列展示 */
            column-count: 3;
            column-gap: 15px;
            padding-bottom: 50px;
            margin-left: 10px;
        }
        
        .task-group {
            /* 核心：防止卡片被从中间撕裂到两列 */
            break-inside: avoid; 
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            overflow: hidden;
            display: inline-block; /* 配合 column 布局 */
            width: 100%;
        }

        .group-header {
            background: #f8f9fa;
            padding: 10px 15px;
            font-size: 14px; font-weight: 700; color: var(--text-main);
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; user-select: none;
            border-bottom: 1px solid #eee;
        }
        .group-header:hover { background: #f1f3f4; }
        .group-header .count { 
            font-size: 11px; color: #666; font-weight: normal; 
            background: #e8eaed; padding: 2px 8px; border-radius: 10px; 
        }
        .group-arrow { transition: transform 0.2s; color: #888; font-size: 12px;}
        .group-arrow.collapsed { transform: rotate(-90deg); }

        .group-body { display: block; }
        .group-body.collapsed { display: none; }

        /* 单个任务行样式微调 */
        .list-task-row {
            display: flex; align-items: flex-start; padding: 12px 15px;
            border-bottom: 1px solid #f1f3f4;
            transition: background 0.1s;
        }
        .list-task-row:last-child { border-bottom: none; }
        .list-task-row:hover { background: #fafafa; }
        
        .list-checkbox {
            width: 18px; height: 18px; border: 2px solid var(--text-sub); border-radius: 50%;
            margin-right: 10px; flex-shrink: 0; position: relative; margin-top: 2px; cursor: pointer;
        }
        .list-checkbox.checked { border-color: var(--primary); background: var(--primary); }
        .list-checkbox.checked::after { content:''; position: absolute; left: 5px; top: 1px; width: 4px; height: 9px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }

        /* 手机端强制改为单列 */
        @media (max-width: 768px) {
            #taskList { column-count: 1; }
        }
        .checkbox { width: 18px; height: 18px; border: 2px solid var(--text-sub); border-radius: 50%; margin-right: 15px; flex-shrink: 0; position: relative; }
        .checkbox.checked { border-color: var(--primary); background: var(--primary); }
        .checkbox.checked::after { content:''; position: absolute; left: 5px; top: 1px; width: 4px; height: 9px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }

        .fab { position: absolute; bottom: 75px; right: 40px; width: 56px; height: 56px; background: white; border-radius: 16px; box-shadow: var(--fab-shadow); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; }
        
        /* Mobile Nav */
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: white; border-top: 1px solid var(--border); justify-content: space-around; align-items: center; z-index: 10; }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text-sub); background: none; border: none; width: 100%; height: 100%; }
        .bottom-nav-item.active { color: var(--primary); }

        /* 通用表单元素 */
        .input-row { display: flex; gap: 10px; align-items: center; }
        input, select { border: none; border-bottom: 1px solid #ddd; padding: 10px 5px; outline: none; background: transparent; font-size: 14px; width: 100%; }
        
        /* 新的数据管理按钮样式 */
        .data-section { text-align: left; margin-bottom: 15px; }
        .data-label { font-size: 13px; font-weight: bold; color: var(--text-sub); margin-bottom: 8px; display:block;}
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .data-btn { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; 
            padding: 12px; border: 1px solid #eee; border-radius: 10px; background: #fff; 
            font-size: 13px; color: var(--text-main); cursor: pointer; transition: all 0.2s;
        }
        .data-btn:active { transform: scale(0.98); }
        
        /* 蓝色云端按钮 */
        .data-btn.cloud { background: var(--primary-light); color: var(--primary); border: none; }
        /* 灰色本地按钮 */
        .data-btn.local { background: #f1f3f4; border: none; }
        
        .data-icon { font-size: 20px; margin-bottom: 2px; }

        .btn { padding: 10px 20px; border: none; background: none; color: var(--primary); font-weight: 500; cursor: pointer; border-radius: 4px; }
        .btn.cancel { color: var(--text-sub); }
        
        .divider { height:1px; background:#eee; margin:15px 0; width:100%; }
        .section-title { font-size:14px; font-weight:bold; color:#444; margin: 10px 0 5px 0; }

        @media (max-width: 768px) {
            aside { display: none; }
            .bottom-nav { display: flex; }
            .fab { bottom: 90px; right: 20px; }
            .view-container { padding: 10px; padding-bottom: 100px; }
            .day-cell { min-height: 85px; padding: 2px; }
            .context-menu { width: 100%; left: 0 !important; top: auto !important; bottom: 0; border-radius: 16px 16px 0 0; border: none; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); padding: 10px 0 20px 0; animation: slideUp 0.2s ease-out; }
            .lunar-text { font-size: 9px; }
            .day-weather { font-size: 9px; }
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(2px);
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        .loading-text { font-size: 14px; color: var(--text-main); font-weight: 500; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* 分类管理样式 */
        .cat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 4px; background: white; border-radius: 4px; }
        .cat-color-dot { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }
        .cat-btn-sm { padding: 2px 6px; font-size: 12px; border: 1px solid #ddd; background: #fff; border-radius: 4px; cursor: pointer; color: #666; }
        .cat-btn-sm:hover { background: #f1f1f1; }
        .cat-tag { 
            font-size: 10px; color: #fff; padding: 1px 5px; border-radius: 4px; 
            margin-right: 5px; display: inline-block; vertical-align: middle;
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }
        /* --- 动态星星交互样式 --- */
        .star-rating { display: inline-flex; align-items: center; height: 35px; gap: 2px; }
        .star-rating span { 
            font-size: 22px; cursor: pointer; color: #ccc; 
            user-select: none; transition: transform 0.1s; 
        }
        .star-rating span:hover { transform: scale(1.2); }
        .star-rating span.active { color: #fbbc04; /* 经典的星标黄 */ }
        
        .list-checkbox.skipped { border-color: #d93025; background: #fce8e6; display:flex; align-items:center; justify-content:center; }
        .list-checkbox.skipped::after { content: '×'; font-size:16px; color:#d93025; position:static; transform:none; border:none; width:auto; height:auto; margin-top:-2px;}
        .cal-task-pill.skipped { background: #fce8e6 !important; color: #d93025 !important; border-left-color: #d93025 !important; text-decoration: line-through; opacity: 0.8; }
        .edit-btn-sm { margin-left:auto; font-size:14px; cursor:pointer; opacity:0.3; padding:5px; transition:0.2s; user-select:none; }
        .edit-btn-sm:hover { opacity:1; transform:scale(1.1); }
        
        /* 👇 项目标签导航与拖拽样式 👇 */
        .tag-nav-item { 
            padding: 10px 24px; font-size: 13px; color: var(--text-sub); 
            cursor: grab; display: flex; align-items: center; 
            margin-left: -20px; border-radius: 0 50px 50px 0; transition: background 0.2s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .tag-nav-item:active { cursor: grabbing; }
        .tag-nav-item:hover { background: #f1f3f4; }
        .tag-nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: bold; }
        .tag-nav-item.drag-over { border-top: 2px solid var(--primary); background: #e8eaed; }
        .sidebar-tags { flex-grow: 1; overflow-y: auto; overflow-x: hidden; margin-top: 10px; padding-bottom: 20px;}
        .project-tag-badge { font-size: 10px; color: #fff; background-color: #607d8b; padding: 1px 5px; border-radius: 4px; margin-right: 5px; }
        
    </style>
</head>
<body>

<aside>
    <div class="logo"><span style="color:#4285F4; font-weight:bold; font-size: 28px;">H</span> &nbsp;Tasks</div>
    <button class="nav-btn" onclick="switchView('calendar')" id="nav-cal-pc"><span>📅</span> 日历</button>
    <button class="nav-btn" onclick="switchView('list')" id="nav-list-pc"><span>📝</span> 列表</button>
    <div style="font-size:11px; font-weight:bold; color:#888; margin-left:10px; margin-top:25px; margin-bottom:5px; text-transform:uppercase;">🏷️ 项目标签</div>
    <div id="sidebarTags" class="sidebar-tags">
        <!-- JS 会在这里动态生成可拖拽的标签 -->
    </div>
    <div class="action-group">
        <button class="text-btn" onclick="openDataModal()">📂 数据管理</button>
        
    </div>
</aside>
<!-- 全局加载 Loading -->
<div id="globalLoading" class="loading-overlay">
    <div class="spinner"></div>
    <div id="loadingText" class="loading-text">正在处理...</div>
</div>
<main>
    <div id="calendarView" class="view-container">
        <div class="calendar-header">
            <div class="header-left">
                <div style="display:flex; align-items:center;">
                    <h2 id="calTitle" style="margin:0; font-size: 18px;"></h2>
                    <span class="settings-icon" onclick="openSettingsModal()">⚙️</span>
                </div>
                <div class="weather-info" id="headerWeather">
                    加载天气...
                </div>
            </div>
            <div class="cal-ctrls">
                <button onclick="changeMonth(-1)">❮</button>
                <button onclick="changeMonth(0)">今天</button>
                <button onclick="changeMonth(1)">❯</button>
            </div>
        </div>
        <div class="calendar-grid">
            <div class="cal-head-cell">一</div><div class="cal-head-cell">二</div>
            <div class="cal-head-cell">三</div><div class="cal-head-cell">四</div>
            <div class="cal-head-cell">五</div>
            <div class="cal-head-cell weekend">六</div><div class="cal-head-cell weekend">日</div>
            <div id="calBody" style="display:contents"></div>
        </div>
    </div>

    <div id="listView" class="view-container">
        <h2 style="font-size: 18px; margin-bottom: 20px;margin-left: 10px;">任务清单</h2>
        <div id="taskList"></div>
    </div>

    <div id="dailyView" class="view-container">
        <div class="calendar-header" style="justify-content: flex-start; gap: 15px;">
            <button onclick="switchView('calendar')" style="padding: 6px 15px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; color: var(--text-main);">🔙 返回日历</button>
            <h2 id="dailyTitle" style="margin:0; font-size: 18px;"></h2>
        </div>
        <div style="padding: 15px;">
            <div id="dailyTaskList" class="task-group" style="padding-bottom: 10px;"></div>
            <!-- 单日快捷添加按钮 -->
            <button onclick="openModalForDaily()" style="width: 100%; padding: 12px; margin-top: 15px; border: 2px dashed #ccc; background: transparent; border-radius: 12px; color: #888; cursor: pointer; font-size: 14px;">
                ➕ 为这天添加新任务
            </button>
        </div>
    </div>

    <div class="fab" onclick="openModal()">
        <svg viewBox="0 0 24 24" width="32" height="32"><path fill="#ea4335" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </div>
    
    <!-- 右键菜单 -->
    <div id="contextMenu" class="context-menu">
        <div style="text-align:center; padding:5px; color:#ccc; font-size:12px;">操作选项</div>
        <div class="context-menu-item" onclick="menuAction('edit')"><span>✏️</span> 编辑任务</div>
        <div class="context-menu-item" onclick="menuAction('toggle')"><span>✅</span> 切换完成</div>
        <div style="height:1px; background:#eee; margin:2px 0;"></div>
        <div class="context-menu-item danger" onclick="menuAction('delete')"><span>🗑️</span> 删除此条</div>
        <div class="context-menu-item danger" onclick="menuAction('deleteFuture')"><span>⏩</span> 删除此条及后续</div>
        <div class="context-menu-item" onclick="hideContextMenu()" style="justify-content:center; color:#666; border-top:5px solid #f5f5f7; margin-top:5px;">取消</div>
    </div>
</main>

<nav class="bottom-nav">
    <button class="bottom-nav-item" onclick="switchView('calendar')" id="nav-cal-mob"><span>📅</span> 日历</button>
    <button class="bottom-nav-item" onclick="switchView('list')" id="nav-list-mob"><span>📝</span> 列表</button>
    <button class="bottom-nav-item" onclick="openDataModal()"><span>💾</span> 数据</button>
</nav>

<!-- 任务模态框 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3 id="modalTitle">新任务</h3>
        <!-- 任务模态框 (内部表单区域) -->
        <input type="text" id="inputTask" placeholder="准备做什么？" style="font-size:18px; margin-bottom:10px;" autofocus>
        
        <!-- 第1行：日期 + 分类 -->
        <div class="input-row">
            <div style="flex:1.2">
                <label style="font-size:12px; color:#666; display:block; margin-bottom:4px;">日期</label>
                <input type="date" id="inputDate" style="width:100%; box-sizing:border-box;">
            </div>
            <div style="flex:1">
                <label style="font-size:12px; color:#666; display:block; margin-bottom:4px;">分类</label>
                <select id="inputCategory" style="width:100%; box-sizing:border-box;">
                    <option value="">默认 (无分类)</option>
                </select>
            </div>
        </div>

        <!-- 第2行：耗时 + 动态星标 -->
        <div class="input-row" style="margin-top:12px;">
            <div style="flex:1">
                <label style="font-size:12px; color:#666; display:block; margin-bottom:4px;">预期耗时</label>
                <select id="inputDuration" style="width:100%; box-sizing:border-box;">
                    <option value="">未设定</option>
                    <option value="15m">15分钟</option>
                    <option value="30m">30分钟</option>
                    <option value="45m">45分钟</option>

<script>
    // --- 1. 数据与配置 ---
    const defaultConf = { 
        city: 'shanghai', lat: 31.23, lon: 121.47, name: '上海',
        webdav: { url: '/webdav/TDL/', user: '', pass: '' },
        categories: [
            { id: 'work', name: '工作', color: '#1a73e8' },
            { id: 'personal', name: '个人', color: '#34a853' },
            { id: 'urgent', name: '紧急', color: '#d93025' }
        ],
        projectTags: []
    };
    
    let config = JSON.parse(localStorage.getItem('gTasksConfig')) || defaultConf;
    if (!config.categories) config.categories = defaultConf.categories;
    if (!config.webdav) config.webdav = { url: '/webdav/TDL/', user: '', pass: '' };
    if (!config.webdav.url || config.webdav.url === '/webdav/') config.webdav.url = '/webdav/TDL/';
    if (!config.projectTags) config.projectTags = [];

    let todos = JSON.parse(localStorage.getItem('gTasksData_v3')) || [];
    let currentCalDate = new Date();
    let selectedTask = null; 
    let editingTaskId = null; 
    let weatherData = {}; 
    
    // --- 解决报错的关键：在这里统一定义所有全局变量 ---
    let currentDailyDate = ''; 
    let tempSubtasks = [];
    let currentFilterTag = null;
    let currentPriority = 0;

    const cityCoords = { shanghai: { lat: 31.23, lon: 121.47, name: '上海' }, beijing: { lat: 39.90, lon: 116.40, name: '北京' }, guangzhou: { lat: 23.13, lon: 113.26, name: '广州' }, shenzhen: { lat: 22.54, lon: 114.06, name: '深圳' }, chengdu: { lat: 30.57, lon: 104.06, name: '成都' }, hangzhou: { lat: 30.27, lon: 120.15, name: '杭州' }, wuhan: { lat: 30.59, lon: 114.30, name: '武汉' } };
    const weatherIcons = { 0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️', 51: '🌧️', 53: '🌧️', 55: '🌧️', 61: '🌧️', 63: '🌧️', 65: '🌧️', 71: '❄️', 73: '❄️', 75: '❄️', 80: '🌦️', 81: '🌦️', 82: '⛈️', 95: '⛈️', 96: '⛈️', 99: '⛈️' };

    // --- 2. 初始化 ---
    init();

    function init() {
        document.getElementById('inputDate').valueAsDate = new Date();
        updateProjectTags(); 
        switchView('calendar');
        fetchWeather(); 
        
        document.addEventListener('click', (e) => {
            if(!e.target.closest('#contextMenu') && !e.target.closest('.cal-task-pill') && !e.target.closest('.list-task-row')) hideContextMenu();
            if(e.target.classList.contains('modal-overlay')) {
                document.querySelectorAll('.modal-overlay').forEach(el => el.style.display = 'none');
                hideContextMenu();
            }
        });
        document.addEventListener('contextmenu', e => { if(e.target.closest('.cal-task-pill')) e.preventDefault(); });
        document.getElementById('recurUnit').addEventListener('change', function() { document.getElementById('endDateRow').style.display = this.value === 'none' ? 'none' : 'flex'; });
    }

    // --- 3. 核心功能函数 ---
    function saveData() { 
        localStorage.setItem('gTasksData_v3', JSON.stringify(todos)); 
        updateProjectTags(); 
    }

    function switchView(view, filterTag = null) {
        currentFilterTag = filterTag; // 更新全局状态
        document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn, .bottom-nav-item').forEach(el => el.classList.remove('active'));
        
        renderSidebarTags(); 

        let targetId = 'calendarView';
        if (view === 'list' || view === 'tag') targetId = 'listView';
        if (view === 'daily') targetId = 'dailyView';
        document.getElementById(targetId).classList.add('active');
        
        if(view === 'calendar') { ['nav-cal-pc','nav-cal-mob'].forEach(id => document.getElementById(id)?.classList.add('active')); renderCalendar(); }
        else if(view === 'list' || view === 'tag') { ['nav-list-pc','nav-list-mob'].forEach(id => document.getElementById(id)?.classList.add('active')); renderList(); }
        else if(view === 'daily') { renderDailyView(); } 
    }

    function renderCurrentView() { 
        if(document.getElementById('calendarView').classList.contains('active')) renderCalendar();
        else if(document.getElementById('listView').classList.contains('active')) renderList();
        else if(document.getElementById('dailyView').classList.contains('active')) renderDailyView();
    }
    
    function changeMonth(d) { if(d === 0) currentCalDate = new Date(); else currentCalDate.setMonth(currentCalDate.getMonth() + d); renderCalendar(); }
    
    // --- 4. 标签系统 ---
    function updateProjectTags() {
        const currentTags = [...new Set(todos.map(t => t.projectTag).filter(Boolean))];
        if (!config.projectTags) config.projectTags = [];
        currentTags.forEach(tag => { if (!config.projectTags.includes(tag)) config.projectTags.push(tag); });
        config.projectTags = config.projectTags.filter(tag => currentTags.includes(tag));
        
        localStorage.setItem('gTasksConfig', JSON.stringify(config));
        renderSidebarTags();
        
        const datalist = document.getElementById('projectTagList');
        if(datalist) datalist.innerHTML = config.projectTags.map(tag => `<option value='${tag}'>`).join('');
    }

    function renderSidebarTags() {
        const container = document.getElementById('sidebarTags');
        if(!container) return;
        container.innerHTML = '';
        
        config.projectTags.forEach((tag, index) => {
            const el = document.createElement('div');
            el.className = `tag-nav-item ${currentFilterTag === tag ? 'active' : ''}`;
            el.innerHTML = `<span>#</span>&nbsp; ${tag}`;
            el.draggable = true;
            
            el.ondragstart = (e) => { e.dataTransfer.setData('text/plain', index); };
            el.ondragover = (e) => { e.preventDefault(); el.classList.add('drag-over'); };
            el.ondragleave = (e) => { el.classList.remove('drag-over'); };
            el.ondrop = (e) => {
                e.preventDefault(); el.classList.remove('drag-over');
                const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                if (fromIndex !== index) {
                    const [moved] = config.projectTags.splice(fromIndex, 1);
                    config.projectTags.splice(index, 0, moved);
                    updateProjectTags(); 
                }
            };
            
            el.onclick = () => { switchView('tag', tag); };
            container.appendChild(el);
        });
    }

    // --- 5. 任务状态与编辑 ---
    function toggleTask(id) { 
        const t = todos.find(x => x.id == id); 
        if(t) { 
            if(t.skipped) { t.skipped = false; t.completed = false; } 
            else { t.completed = !t.completed; }
            saveData(); renderCurrentView(); 
        } 
    }

    function updateTaskStatus(id, type) {
        const t = todos.find(x => x.id == id);
        if(t) {
            if(type === 'todo') { t.completed = false; t.skipped = false; }
            if(type === 'done') { t.completed = true; t.skipped = false; }
            if(type === 'skipped') { t.completed = false; t.skipped = true; }
            saveData(); renderCurrentView(); 
        }
    }

    function setPriority(val, isUserClick = false) {
        if (isUserClick && currentPriority === val) { val = 0; }
        currentPriority = val;
        const prioInput = document.getElementById('inputPriority');
        if (prioInput) prioInput.value = val;
        const stars = document.querySelectorAll('#starRating span');
        stars.forEach((star, index) => {
            if (index < val) { star.innerText = '⭐'; star.style.color = '#fbbc04'; } 
            else { star.innerText = '☆'; star.style.color = '#ccc'; }
        });
    }

    function openModalById(id) {
        const t = todos.find(x => x.id == id);
        if(t) { selectedTask = t; openModal(t); } 
    }

    function openModal(taskToEdit = null) {
        const overlay = document.getElementById('modalOverlay'); const modal = overlay.querySelector('.modal');
        const title = document.getElementById('modalTitle'); const taskInput = document.getElementById('inputTask');
        const dateInput = document.getElementById('inputDate'); const catSelect = document.getElementById('inputCategory');
        const durationInput = document.getElementById('inputDuration'); const descInput = document.getElementById('inputDesc');
        const projInput = document.getElementById('inputProjectTag');
        const recurSection = document.getElementById('recurrenceSection'); const editHint = document.getElementById('editModeHint');
        const btnCopy = document.getElementById('btnCopy'); 
        
        catSelect.innerHTML = '<option value="">默认 (无分类)</option>';
        config.categories.forEach(c => { catSelect.innerHTML += `<option value='${c.id}' style='color:${c.color}'>🏷️ ${c.name}</option>`; });
        overlay.style.display = 'flex'; modal.style.display = 'flex';

        if (taskToEdit && taskToEdit.id) {
            editingTaskId = taskToEdit.id; title.innerText = '编辑任务';
            taskInput.value = taskToEdit.text || ''; dateInput.value = taskToEdit.date;
            catSelect.value = taskToEdit.categoryId || '';
            if(durationInput) durationInput.value = taskToEdit.duration || ''; 
            if(descInput) descInput.value = taskToEdit.desc || ''; 
            if(projInput) projInput.value = taskToEdit.projectTag || ''; 
            setPriority(Number(taskToEdit.priority) || 0);
            recurSection.style.display = 'none'; editHint.style.display = 'block';
            if(btnCopy) btnCopy.style.display = 'block'; 
            tempSubtasks = taskToEdit.subtasks ? JSON.parse(JSON.stringify(taskToEdit.subtasks)) : [];
        } else {
            editingTaskId = null; title.innerText = '新任务'; taskInput.value = '';
            if(!dateInput.value) dateInput.valueAsDate = new Date();
            catSelect.value = '';
            if(durationInput) durationInput.value = ''; if(descInput) descInput.value = ''; 
            if(projInput) projInput.value = currentFilterTag || ''; 
            setPriority(0);
            recurSection.style.display = 'block'; editHint.style.display = 'none';
            document.getElementById('recurUnit').value = 'none'; document.getElementById('endDateRow').style.display = 'none';
            if(btnCopy) btnCopy.style.display = 'none';
            tempSubtasks = [];
        }
        renderModalSubtasks(); document.getElementById('newSubtaskInput').value = ''; taskInput.focus();
    }

    function addTask() {
        const text = document.getElementById('inputTask').value.trim(); 
        const dateVal = document.getElementById('inputDate').value;
        const catId = document.getElementById('inputCategory').value;
        const duration = document.getElementById('inputDuration') ? document.getElementById('inputDuration').value : ''; 
        const desc = document.getElementById('inputDesc') ? document.getElementById('inputDesc').value.trim() : '';
        const projTag = document.getElementById('inputProjectTag') ? document.getElementById('inputProjectTag').value.trim() : ''; 
        const priority = Number(document.getElementById('inputPriority').value) || 0;
        const interval = parseInt(document.getElementById('recurInterval').value) || 1;
        const unit = document.getElementById('recurUnit').value; 
        const endDateVal = document.getElementById('inputEndDate').value;
        
        if (!text || !dateVal) return alert('请输入内容和日期');

        if (editingTaskId) {
            const taskIndex = todos.findIndex(t => t.id === editingTaskId);
            if (taskIndex > -1) {
                todos[taskIndex].text = text; todos[taskIndex].date = dateVal; todos[taskIndex].categoryId = catId; 
                todos[taskIndex].duration = duration; todos[taskIndex].desc = desc; todos[taskIndex].priority = priority;
                todos[taskIndex].projectTag = projTag; 
                todos[taskIndex].subtasks = JSON.parse(JSON.stringify(tempSubtasks));
            }
        } else {
            const groupId = Date.now().toString(); const newTasks = [];
            const createOne = (dStr) => ({ 
                id: Math.random().toString(36).substr(2, 9), groupId, text, date: dStr, completed: false, skipped: false,
                categoryId: catId, duration: duration, desc: desc, priority: priority, projectTag: projTag, 
                subtasks: JSON.parse(JSON.stringify(tempSubtasks)), tag: unit !== 'none' ? '循环' : '' 
            });

            if (unit === 'none') { newTasks.push(createOne(dateVal)); } else {
                let cursor = new Date(dateVal); let stopDate = endDateVal ? new Date(endDateVal) : new Date(cursor);
                if (!endDateVal) stopDate.setFullYear(stopDate.getFullYear() + 1); let safeCount = 0;
                while (cursor <= stopDate && safeCount < 500) {
                    newTasks.push(createOne(cursor.toISOString().split('T')[0])); const originalDay = cursor.getDate();
                    switch (unit) { case 'day': cursor.setDate(cursor.getDate() + interval); break; case 'week': cursor.setDate(cursor.getDate() + (interval * 7)); break; case 'month': cursor.setMonth(cursor.getMonth() + interval); if (cursor.getDate() !== originalDay) cursor.setDate(0); break; case 'year': cursor.setFullYear(cursor.getFullYear() + interval); break; } safeCount++;
                }
            } 
            todos = [...todos, ...newTasks];
        }
        saveData(); closeModal(); renderCurrentView();
    }

    function copyTask() {
        if(!confirm('确定要复制当前内容为一个新任务吗？')) return;
        editingTaskId = null; addTask(); 
    }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; editingTaskId = null; }

    // --- 6. 子任务控制 ---
    function renderModalSubtasks() {
        const container = document.getElementById('modalSubtasks');
        container.innerHTML = tempSubtasks.map((st, idx) => `
            <div style='display:flex; align-items:center; margin-bottom:6px; gap:8px;'>
                <input type='checkbox' ${st.completed ? 'checked' : ''} onchange='tempSubtasks[${idx}].completed = this.checked' style='width:auto; cursor:pointer;'>
                <input type='text' value='${st.text}' onchange='tempSubtasks[${idx}].text = this.value' style='flex:1; font-size:13px; padding:4px; border:none; border-bottom:1px dashed #ddd; outline:none; background:transparent;'>
                <span onclick='tempSubtasks.splice(${idx}, 1); renderModalSubtasks()' style='color:#d93025; cursor:pointer; font-size:16px;'>×</span>
            </div>
        `).join('');
    }
    function addSubtask() {
        const input = document.getElementById('newSubtaskInput');
        if(input.value.trim()){
            tempSubtasks.push({ id: Date.now().toString(), text: input.value.trim(), completed: false });
            input.value = ''; renderModalSubtasks();
        }
    }
    function toggleSubtask(taskId, subtaskId) {
        const t = todos.find(x => x.id == taskId);
        if(t && t.subtasks) {
            const st = t.subtasks.find(x => x.id == subtaskId);
            if(st) { st.completed = !st.completed; saveData(); renderCurrentView(); }
        }
    }

            <div style='height:1px; background:#eee; margin:2px 0;'></div>
            <div class='context-menu-item' onclick='menuAction('status_todo')'><span>🔄</span> 恢复为待办状态</div>
            <div class='context-menu-item' onclick='menuAction('status_done')'><span>✅</span> 标记为完美完成</div>
            <div class='context-menu-item' onclick='menuAction('status_skipped')' style='color:#d93025;'><span>❌</span> 标记未做/搁置此项</div>

            <div class='context-menu-item danger' onclick='menuAction('deleteFuture')'><span>⏩</span> 删除此条及后续循环</div>
            <div class='context-menu-item' onclick='hideContextMenu()' style='justify-content:center; color:#666; border-top:5px solid #f5f5f7; margin-top:5px;'>取消</div>
        `;
        if(window.innerWidth <= 768) { document.getElementById('modalOverlay').style.display = 'block'; document.querySelector('.modal').style.display = 'none'; }
        menu.style.display = 'block';
        if(window.innerWidth > 768) {
            let x = e.clientX; let y = e.clientY; const rect = menu.getBoundingClientRect();
            if (x + rect.width > window.innerWidth) x -= rect.width;
            if (y + rect.height > window.innerHeight) y -= rect.height;
            menu.style.left = x + 'px'; menu.style.top = y + 'px';
        }

    function hideContextMenu() {
        document.getElementById('contextMenu').style.display = 'none';
        if(window.innerWidth <= 768) { 
            if(document.querySelector('.modal').style.display === 'none') { 
                document.getElementById('modalOverlay').style.display = 'none'; 
                document.querySelector('.modal').style.display = ''; 
            } 
        }
    }
    function menuAction(action) {
        if (!selectedTask) return;
        if (action === 'edit') { openModalById(selectedTask.id); }
        else if (action === 'status_todo') { updateTaskStatus(selectedTask.id, 'todo'); }
        else if (action === 'status_done') { updateTaskStatus(selectedTask.id, 'done'); }
        else if (action === 'status_skipped') { updateTaskStatus(selectedTask.id, 'skipped'); }
        else if (action === 'delete') { if (confirm('确定彻底删除此任务？')) { todos = todos.filter(t => t.id !== selectedTask.id); saveData(); renderCurrentView(); } } 
        else if (action === 'deleteFuture') { if (confirm('删除此任务及后续？')) { todos = todos.filter(t => { const isSame = selectedTask.groupId ? (t.groupId === selectedTask.groupId) : (t.text === selectedTask.text); return !(isSame && new Date(t.date) >= new Date(selectedTask.date)); }); saveData(); renderCurrentView(); } }
        hideContextMenu(); selectedTask = null; 
    }

    function renderCalendar() {
        const body = document.getElementById('calBody'); const title = document.getElementById('calTitle'); body.innerHTML = '';
        const y = currentCalDate.getFullYear(); const m = currentCalDate.getMonth(); title.innerText = `${y}年 ${m + 1}月`;
        let firstDay = new Date(y, m, 1).getDay(); const emptyCells = (firstDay + 6) % 7; const daysInMonth = new Date(y, m + 1, 0).getDate();

        for(let i=0; i<emptyCells; i++) { const cell = document.createElement('div'); cell.className = 'day-cell other-month'; body.appendChild(cell); }

            const dateObj = new Date(y, m, d); const dayOfWeek = dateObj.getDay();
            let classes = ['day-cell']; if (dateStr === todayStr) classes.push('today'); if (dayOfWeek === 0 || dayOfWeek === 6) classes.push('weekend-cell'); cell.className = classes.join(' ');

            let lunarHtml = ''; try { const lunar = Lunar.fromDate(dateObj); let dayText = lunar.getDayInChinese(); let isFestival = false; const festivals = lunar.getFestivals(); const jieQi = lunar.getJieQi(); if (festivals.length > 0) { dayText = festivals[0]; isFestival = true; } else if (jieQi) { dayText = jieQi; isFestival = true; } else if (dayText === '初一') { dayText = lunar.getMonthInChinese() + '月'; } lunarHtml = `<span class='lunar-text ${isFestival?'festival':''}'>${dayText}</span>`; } catch(e) {}
            let weatherHtml = ''; const w = weatherData[dateStr]; if (w) { const icon = weatherIcons[w.code] || ''; weatherHtml = `<span class='day-weather'>${icon} ${w.min}°</span>`; }
            
            cell.innerHTML = `
                <div class='day-top'>
                    <div style='display:flex; align-items:center;'>

                </div>`;

            let dayTasks = todos.filter(t => t.date === dateStr);
            dayTasks.sort((a, b) => {

                if (isDoneA !== isDoneB) return isDoneA - isDoneB;

    async function fetchWeather() {
        const { lat, lon } = config;
        document.getElementById('headerWeather').innerText = `${config.name} 正在获取天气...`;
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`;
            const res = await fetch(url);
            const data = await res.json();
            if(!data.daily) throw new Error('No Data');
            weatherData = {};
            data.daily.time.forEach((t, i) => { weatherData[t] = { code: data.daily.weathercode[i], max: Math.round(data.daily.temperature_2m_max[i]), min: Math.round(data.daily.temperature_2m_min[i]) }; });
            const todayStr = new Date().toISOString().split('T')[0];
            const todayW = weatherData[todayStr];
            if(todayW) document.getElementById('headerWeather').innerText = `📍${config.name} ${weatherIcons[todayW.code]||'🌡️'} ${todayW.min}°~${todayW.max}°`;
            else document.getElementById('headerWeather').innerText = `📍${config.name} (暂无今日数据)`;
            if(document.getElementById('calendarView').classList.contains('active')) renderCalendar();
        } catch (e) { document.getElementById('headerWeather').innerText = `📍${config.name} 天气加载失败`; }
    }

    function triggerImport() { document.getElementById('fileInput').click(); }
    function importData(input) { 
        const reader = new FileReader(); 
        reader.onload = e => { 
            try { 
                const loaded = JSON.parse(e.target.result); 
                if (Array.isArray(loaded)) { todos = loaded; alert('已恢复任务数据 (旧版格式)'); } 
                else if (loaded.todos) { todos = loaded.todos; if (loaded.config) { config = loaded.config; localStorage.setItem('gTasksConfig', JSON.stringify(config)); fetchWeather(); } alert('✅ 已成功恢复数据和配置！'); }
                saveData(); init(); closeDataModal(); 
            } catch (err) { alert('文件错误，无法恢复'); } 
        }; 
        if(input.files[0]) reader.readAsText(input.files[0]); input.value = '';
    }
    async function syncWebDav(direction) {
        let { url, user, pass } = config.webdav;
        if (!url || !user || !pass) { alert('请先配置 WebDAV 信息'); openSettingsModal(); return; }
        const loadingEl = document.getElementById('globalLoading'); const loadingText = document.getElementById('loadingText'); loadingEl.style.display = 'flex';
        try {
            url = url.trim(); if (!url.startsWith('/') && !url.startsWith('http')) url = 'https://' + url;
            let baseUrl = url; if (!baseUrl.endsWith('/')) { if (baseUrl.toLowerCase().endsWith('.json') || baseUrl.toLowerCase().endsWith('.gz')) baseUrl = baseUrl.substring(0, baseUrl.lastIndexOf('/') + 1); else baseUrl += '/'; }
            const fileGz = baseUrl + 'gtasks_backup.json.gz'; const fileJson = baseUrl + 'gtasks_backup.json';
            const auth = btoa(unescape(encodeURIComponent(`${user}:${pass}`))); const headers = new Headers(); headers.set('Authorization', `Basic ${auth}`);
            if (direction === 'up') {
                loadingText.innerText = '正在打包压缩...'; await new Promise(r => setTimeout(r, 10)); 
                const compressedData = pako.gzip(JSON.stringify({ todos: todos, config: config, exportDate: new Date().toISOString() }));
                loadingText.innerText = `正在上传 (${(compressedData.length/1024).toFixed(1)} KB)...`;
                const res = await fetch(fileGz, { method: 'PUT', headers: headers, body: compressedData });
                if (res.ok || res.status === 201 || res.status === 204) { loadingEl.style.display = 'none'; alert('✅ 云端备份成功！'); closeDataModal(); }
                else { const txt = await res.text().catch(()=>''); throw new Error(`上传失败: ${res.status}\n${txt}`); }
            } else {
                loadingText.innerText = '正在连接...'; let downloadRes = await fetch(fileGz, { method: 'GET', headers: headers }); let isGzip = true;
                if (downloadRes.status === 404) { downloadRes = await fetch(fileJson, { method: 'GET', headers: headers }); isGzip = false; }
                if (!downloadRes.ok) { if (downloadRes.status === 404) throw new Error('云端没有任何备份文件。'); throw new Error(`下载失败: ${downloadRes.status}`); }
                loadingText.innerText = '正在解压...'; const arrayBuffer = await downloadRes.arrayBuffer(); let finalData;
                if (isGzip) { finalData = JSON.parse(pako.ungzip(new Uint8Array(arrayBuffer), { to: 'string' })); } else { finalData = JSON.parse(new TextDecoder('utf-8').decode(arrayBuffer)); }
                loadingEl.style.display = 'none';
                let count = Array.isArray(finalData) ? finalData.length : (finalData.todos ? finalData.todos.length : 0);
                if (confirm(`发现云端备份共 ${count} 条记录。是否覆盖本地？`)) {
                    if (Array.isArray(finalData)) todos = finalData; else { todos = finalData.todos; if (finalData.config) { config = finalData.config; localStorage.setItem('gTasksConfig', JSON.stringify(config)); fetchWeather(); } }
                    saveData(); renderCurrentView(); alert('✅ 恢复成功！'); closeDataModal();
                }
            }
        } catch (error) { loadingEl.style.display = 'none'; alert(`❌ 操作失败:\n${error.message}`); }
    }
</script>
